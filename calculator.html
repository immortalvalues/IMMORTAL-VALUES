<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background:#2a1465;
font-family:'Orbitron',sans-serif;
color:white;
}

h1{
text-align:center;
margin-top:40px;
color:#c084fc;
}

.calc-card{
max-width:900px;
margin:40px auto;
padding:30px;
border-radius:18px;
background:linear-gradient(145deg,#1e1b4b,#0f172a);
border:2px solid #a855f7;
box-shadow:0 0 15px #a855f7;
transition:0.4s;
}
  .slot-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:15px;
}

.slot{
height:90px;
border:2px dashed #a855f7;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:700;
color:#c084fc;
cursor:pointer;
background:rgba(255,255,255,0.03);
transition:0.3s;
}

.slot:hover{
background:rgba(168,85,247,0.15);
transform:scale(1.03);
box-shadow:0 0 12px #a855f7;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.side h2{
text-align:center;
color:#c084fc;
}

select{
width:100%;
padding:12px;
margin:8px 0;
background:#111827;
color:white;
border:1px solid #a855f7;
border-radius:10px;
}

button{
display:block;
margin:25px auto;
padding:12px 28px;
background:#a855f7;
border:none;
border-radius:10px;
color:white;
font-weight:700;
cursor:pointer;
}

button:hover{
background:#9333ea;
}

#result{
text-align:center;
font-size:24px;
margin-top:20px;
}

#diff{
text-align:center;
margin-top:10px;
font-size:18px;
color:#ddd;
}

.win{
border-color:#22c55e;
box-shadow:0 0 18px #22c55e;
background:linear-gradient(145deg,#052e16,#0f172a);
}

.loss{
border-color:#ef4444;
box-shadow:0 0 18px #ef4444;
background:linear-gradient(145deg,#450a0a,#0f172a);
}

.smallloss{
border-color:orange;
box-shadow:0 0 18px orange;
background:linear-gradient(145deg,#451a03,#0f172a);
}

.fair{
border-color:white;
box-shadow:0 0 18px white;
background:linear-gradient(145deg,#1f2937,#0f172a);
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

  .navbar {
position: sticky;
top: 0;
z-index: 1000;
background: rgba(10, 20, 45, 0.95);
display: flex;
justify-content: space-between;
align-items: center;
padding: 14px 26px;
border-bottom: 1px solid #a855f7;
backdrop-filter: blur(8px);
}

.left-side {
display: flex;
align-items: center;
gap: 12px;
}
  .site-logo{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
}

.left-side h2 {
margin: 0;
font-size: 28px;
color: #c084fc;
}

.menu-btn {
font-size: 38px;
color: #c084fc;
}

.center-links {
display: flex;
gap: 14px;
}

.center-links a {
color: white;
text-decoration: none;
font-size: 18px;
font-weight: 600;
padding: 8px 14px;
border-radius: 8px;
transition: 0.3s;
}

.center-links a:hover {
color: #c084fc;
}

.right-side {
width: 90px;
}
  .picker-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.picker-box{
width:90%;
max-width:700px;
background:#111827;
padding:25px;
border-radius:18px;
border:2px solid #a855f7;
}

.picker-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:18px;
}

.pick-card{
padding:16px;
background:#1e1b4b;
border:1px solid #a855f7;
border-radius:14px;
cursor:pointer;
text-align:center;
font-weight:700;
transition:0.3s;
}

.pick-card img{
width:70px;
height:70px;
object-fit:cover;
border-radius:18px;
margin-bottom:10px;
}

.pick-card h3{
margin:5px 0;
font-size:18px;
color:#fff;
}

.pick-card p{
margin:0;
font-size:13px;
color:#cbd5e1;
}

.pick-card:hover{
background:#9333ea;
}

  .slot-img{
width:70px;
height:70px;
object-fit:cover;
border-radius:18px;
}
  
</style>
</head>

<body>
  <header class="navbar">

<div class="left-side">
<span class="menu-btn">☰</span>
<img src="images/IBVLOGO.png" class="site-logo">
<h2>IBV</h2>
</div>

<div class="center-links">
<a href="index.html">Home</a>
</div>

<div class="right-side"></div>

</header>

<h1>Trade Calculator</h1>

<div class="calc-card" id="card">

<div class="grid">

<div class="side">
<h2>Your Side</h2>

<div class="slot-grid">
<div class="slot" onclick="openPicker(this)">+</div>
<div class="slot" onclick="openPicker(this)">+</div>
<div class="slot" onclick="openPicker(this)">+</div>
<div class="slot" onclick="openPicker(this)">+</div>
</div>
  <div id="yourTotals">
Total Value: 0<br>
Total Demand: 0
</div>

</div>

<div class="side">
<h2>Their Side</h2>

<div class="slot-grid">
<div class="slot" onclick="openPicker(this)">+</div>
<div class="slot" onclick="openPicker(this)">+</div>
<div class="slot" onclick="openPicker(this)">+</div>
<div class="slot" onclick="openPicker(this)">+</div>
</div>
  <div id="theirTotals">
Total Value: 0<br>
Total Demand: 0
</div>

</div>

<button onclick="checkTrade()">Check Trade</button>

<div id="result"></div>
<div id="diff"></div>

</div>

   <div id="picker" class="picker-popup">

<div class="picker-box">

<h2>Select Fruit</h2>

<div class="picker-grid">

<div class="pick-card" onclick="chooseFruit('Dragon',24000000,'images/dragon(Western).png',10)">
<img src="images/dragon.png">
<h3>Dragon(Western)</h3>
</div>

<div class="pick-card" onclick="chooseFruit('Kitsune',3000000,'images/kitsune.png',9)">
<img src="images/kitsune.png">
<h3>Kitsune</h3>
</div>

<div class="pick-card" onclick="chooseFruit('Dough',175000,'images/dough.png',8)">
<img src="images/dough.png">
<h3>Dough</h3>
</div>

<div class="pick-card" onclick="chooseFruit('Buddha',75000,'images/buddha.png',7)">
<img src="images/buddha.png">
<h3>Buddha</h3>
</div>

</div>
  <button onclick="closePicker()">Close</button>
</div>

<script>
 
  let activeSlot = null;

function openPicker(slot){
activeSlot = slot;
document.getElementById("picker").style.display="flex";
}

function closePicker(){
document.getElementById("picker").style.display="none";
}

function chooseFruit(name,val,img,demand){

activeSlot.innerHTML =
'<img src="'+img+'" class="slot-img">';

activeSlot.setAttribute("data-value",val);
activeSlot.setAttribute("data-demand",demand);

closePicker();
updateTotals();
}

  function updateTotals(){

let yourValue=0;
let yourDemand=0;
let theirValue=0;
let theirDemand=0;

document.querySelectorAll(".side:first-child .slot").forEach(slot=>{
yourValue += Number(slot.dataset.value || 0);
yourDemand += Number(slot.dataset.demand || 0);
});

document.querySelectorAll(".side:last-child .slot").forEach(slot=>{
theirValue += Number(slot.dataset.value || 0);
theirDemand += Number(slot.dataset.demand || 0);
});

document.getElementById("yourTotals").innerHTML =
"Total Value: "+yourValue.toLocaleString()+"<br>Total Demand: "+yourDemand;

document.getElementById("theirTotals").innerHTML =
"Total Value: "+theirValue.toLocaleString()+"<br>Total Demand: "+theirDemand;

}
  
function checkTrade(){

let yourTotal=0;
let theirTotal=0;

document.querySelectorAll(".side:first-child .slot").forEach(slot=>{
yourTotal += Number(slot.dataset.value || 0);
});

document.querySelectorAll(".side:last-child .slot").forEach(slot=>{
theirTotal += Number(slot.dataset.value || 0);
});

let diff = theirTotal - yourTotal;

let card = document.getElementById("card");
card.className="calc-card";

if(diff > 0){
card.classList.add("win");
document.getElementById("result").innerHTML="🟢 W Trade";
}
else if(diff == 0){
card.classList.add("fair");
document.getElementById("result").innerHTML="⚪ Fair Trade";
}
else{

if(yourTotal > 0 && Math.abs(diff)/yourTotal <= 0.10){
card.classList.add("smallloss");
document.getElementById("result").innerHTML="🟠 Small L";
}
else{
card.classList.add("loss");
document.getElementById("result").innerHTML="🔴 L Trade";
}

}

document.getElementById("diff").innerHTML =
"Value Difference: "+Math.abs(diff).toLocaleString();

}
  
</script>

</body>
</html>
